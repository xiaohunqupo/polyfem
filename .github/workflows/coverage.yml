name: Coverage

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CTEST_OUTPUT_ON_FAILURE: ON

jobs:
  Linux:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      CTEST_PARALLEL_LEVEL: 4
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        threading: [TBB]
        include:
          - os: ubuntu-22.04
            name: Linux
    steps:
      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h

          # Remove big toolchains we don't need
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android

          # Clean apt caches
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "After cleanup:"
          df -h


      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 10

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get -o Acquire::Retries=3 install \
          libblas-dev \
          libglu1-mesa-dev \
          xorg-dev \
          ccache \
          ninja-build \
          lcov
          echo 'CACHE_PATH=~/.cache/ccache' >> "$GITHUB_ENV"

      - name: Compute CPU cache key
        run: |
          # A dependency builds with -march=native, which bakes CPU-specific
          # instructions (e.g. AVX-512) into the object files. ccache hashes the
          # literal "-march=native" flag, not the resolved instruction set, so it
          # will happily reuse objects across different CPUs. GitHub's runner pool
          # is heterogeneous (some hosts have AVX-512, some don't), so a cache built
          # on a wider CPU gets replayed onto a narrower one -> SIGILL at runtime.
          # Fold the CPU feature flags into the cache key so objects are only ever
          # restored onto a compatible microarchitecture.
          CPU_HASH=$(grep -m1 '^flags' /proc/cpuinfo | md5sum | cut -d' ' -f1)
          echo "CPU_HASH=$CPU_HASH" >> "$GITHUB_ENV"
          echo "CPU flags hash: $CPU_HASH"

      - name: Cache Build
        id: cache-build
        uses: actions/cache@v5
        with:
          path: ${{ env.CACHE_PATH }}
          key: ${{ runner.os }}-cov-${{ matrix.threading }}-cpu-${{ env.CPU_HASH }}-cache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-cov-${{ matrix.threading }}-cpu-${{ env.CPU_HASH }}-cache

      - name: Prepare ccache
        run: |
          # ccache --max-size=1.0G
          ccache -V && ccache --show-stats && ccache --zero-stats

      - name: Configure
        run: |
          cmake -G Ninja -S . -B build \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_FLAGS_DEBUGNOSYMBOLS="" \
            -DPOLYFEM_CODE_COVERAGE=ON \
            -DPOLYSOLVE_WITH_CHOLMOD=OFF \
            -DPOLYSOLVE_WITH_AMGCL=OFF \
            -DPOLYFEM_THREADING=${{ matrix.threading }}

      - name: Build
        run: cmake --build build && ccache --show-stats

      - name: Run Tests
        run: OMP_NUM_THREADS=1 ctest --test-dir build --timeout 3000 --output-on-failure

      - name: Create Coverage
        run: |
          cd build
          lcov --directory . --capture --output-file coverage.info
          lcov --remove coverage.info '/usr/*' "${HOME}"'/.cache/*' '*tests/*.cpp*' '*/polyfem/problem/*.cpp*' '*/polyfem/problem/*.hpp*' '*/polyfem/legacy/*' --output-file coverage.info

      - name: Upload Coverage
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
            flags: polyfem # optional
            files: coverage.info
            name: polyfem # optional
            fail_ci_if_error: false # optional (default = false)
            verbose: true # optional (default = false)
